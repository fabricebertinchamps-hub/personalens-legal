<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PersonaLens - Legal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #E8E8ED;
            background: linear-gradient(180deg, #1C1F2E 0%, #13141F 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #A8B5A0 0%, #8FA084 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .tagline {
            color: #AEAEB2;
            margin-bottom: 48px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        a {
            display: block;
            padding: 16px 32px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #E8E8ED;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        a:hover {
            background: rgba(168, 181, 160, 0.1);
            border-color: rgba(168, 181, 160, 0.3);
        }

        .app-store {
            margin-top: 48px;
            color: #8E8E93;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo-text">PersonaLens</h1>
        <p class="tagline">AI-Powered Personality Analysis</p>

        <div class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html">Terms of Service</a>
            <a href="support.html">Support</a>
        </div>

        <p class="app-store">Available on the App Store</p>
    </div>
</body>
</html>
