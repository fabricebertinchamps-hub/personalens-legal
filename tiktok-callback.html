<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TikTok OAuth Callback - PersonaLens</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #1a1a2e; color: #e0e0e0; }
        .container { text-align: center; padding: 2rem; max-width: 600px; }
        h1 { color: #c9a87c; }
        .code-box { background: #16213e; padding: 1rem; border-radius: 8px; word-break: break-all; font-family: monospace; margin: 1rem 0; border: 1px solid #0f3460; }
        p { line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PersonaLens TikTok Authorization</h1>
        <div id="result"></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const resultDiv = document.getElementById('result');
        if (code) {
            resultDiv.innerHTML = '<p>Authorization successful!</p><p>Your authorization code:</p><div class="code-box">' + code + '</div><p>Copy this code and use it to exchange for access tokens.</p>';
        } else if (error) {
            resultDiv.innerHTML = '<p style="color:#e74c3c;">Authorization failed: ' + error + '</p><p>' + (params.get('error_description') || '') + '</p>';
        } else {
            resultDiv.innerHTML = '<p>Waiting for TikTok authorization redirect...</p>';
        }
    </script>
</body>
</html>
